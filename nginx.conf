server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Legacy Storefront API Proxy routing
    location /api/database/records/ {
        proxy_pass http://host.docker.internal:5430/;
        proxy_set_header Host $host;
    }

    location /api/database/rpc/ {
        proxy_pass http://host.docker.internal:5430/rpc/;
        proxy_set_header Host $host;
    }

    location /api/auth/ {
        proxy_pass http://host.docker.internal:7131/;
        proxy_set_header Host $host;
    }

    # InsForge Native SDK Proxy routing (used by frontend-erp @insforge/sdk)
    location /rest/v1/ {
        proxy_pass http://host.docker.internal:5430/;
        proxy_set_header Host $host;
    }

    location /auth/v1/ {
        proxy_pass http://host.docker.internal:7131/;
        proxy_set_header Host $host;
    }

    location /storage/v1/ {
        proxy_pass http://host.docker.internal:5000/; # Assumed standard storage port wrapper if it exists 
        proxy_set_header Host $host;
    }

    location /functions/v1/ {
        proxy_pass http://host.docker.internal:9000/; # Edge functions
        proxy_set_header Host $host;
    }


    # ERP SPA fallback (must come before the root fallback)
    location /admin/ {
        try_files $uri $uri/ /admin/index.html;
    }

    # Store SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
